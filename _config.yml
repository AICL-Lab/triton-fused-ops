title: Triton Fused Ops
description: "Fused Triton kernels for Transformer inference (RMSNorm+RoPE, Gated MLP, FP8 GEMM)."

url: https://lessup.github.io
baseurl: /triton-fused-ops
repository: LessUp/triton-fused-ops
lang: en
logo: "/assets/images/logo.svg"

remote_theme: just-the-docs/just-the-docs@v0.8.2
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

color_scheme: light
search_enabled: true
heading_anchors: true
back_to_top: true
back_to_top_text: "Back to top"
footer_content: ""

aux_links:
  "English Docs":
    - "/docs/en/"
  "中文文档":
    - "/docs/zh/"
aux_links_new_tab: false

collections:
  docs:
    permalink: "/:collection/:path/"
    output: true

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: default

exclude:
  - .git
  - .github
  - .venv
  - .venv*
  - .pytest_cache
  - .hypothesis
  - __pycache__
  - "*.egg-info"
  - dist
  - build
  - triton_ops
  - tests
  - examples
  - Dockerfile
  - docker-compose.yml
  - pyproject.toml
  - .editorconfig
  - .devcontainer
  - .vscode
  - .githooks
  - openspec
  - changelog
  - README.md
  - README.zh-CN.md
  - CHANGELOG.md
  - CHANGELOG.zh-CN.md
  - CONTRIBUTING.md
  - AGENTS.md
  - CLAUDE.md
  - CLAUDE.local.md
